name: Build SimC

on:
  workflow_call:
    inputs:
      release_type:
        required: true
        type: string
        description: "nightly or weekly"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
            artifact: simc
          - os: ubuntu-24.04-arm
            name: linux-arm64
            artifact: simc
          - os: macos-latest
            name: macos
            artifact: simc
          - os: windows-latest
            name: windows
            artifact: simc.exe

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - name: Checkout simc
        uses: actions/checkout@v4
        with:
          repository: simulationcraft/simc
          fetch-depth: 1

      - name: Get simc commit SHA
        id: sha
        shell: bash
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies (Linux)
        if: startsWith(matrix.name, 'linux')
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Build simc (Linux)
        if: startsWith(matrix.name, 'linux')
        run: |
          cmake -B build \
            -DBUILD_GUI=OFF -DBUILD_TESTING=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS_RELEASE="-O2 -ffast-math -fomit-frame-pointer -DNDEBUG"
          cmake --build build --target simc -j$(nproc)
          cp build/simc simc

      - name: Build simc (macOS)
        if: matrix.name == 'macos'
        run: |
          cmake -B build \
            -DBUILD_GUI=OFF -DBUILD_TESTING=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS_RELEASE="-O2 -ffast-math -fomit-frame-pointer -DNDEBUG"
          cmake --build build --target simc -j$(sysctl -n hw.ncpu)
          cp build/simc simc

      - name: Build simc (Windows)
        if: matrix.name == 'windows'
        shell: cmd
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DBUILD_GUI=OFF -DBUILD_TESTING=OFF -DCMAKE_CXX_FLAGS_RELEASE="/O2 /Ob3 /GL /fp:fast /DNDEBUG" -DCMAKE_EXE_LINKER_FLAGS_RELEASE="/LTCG"
          cmake --build build --config Release --target simc
          copy build\Release\simc.exe simc.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: simc-${{ matrix.name }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          repository: simulationcraft/simc
          fetch-depth: 1

      - name: Get simc commit SHA
        id: sha
        shell: bash
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release tag
        id: tag
        shell: bash
        run: |
          DATE=$(date -u +%Y-%m-%d)
          TYPE="${{ inputs.release_type }}"
          SHA="${{ steps.sha.outputs.sha }}"
          echo "tag=${TYPE}-${DATE}" >> "$GITHUB_OUTPUT"
          echo "name=SimC ${TYPE^} — ${DATE} (${SHA})" >> "$GITHUB_OUTPUT"

      - name: Package binaries
        shell: bash
        run: |
          mkdir -p release

          # Windows
          cd artifacts/simc-windows
          zip ../../release/simc-windows-x64.zip simc.exe
          cd ../..

          # Linux x64
          chmod +x artifacts/simc-linux-x64/simc
          cd artifacts/simc-linux-x64
          tar czf ../../release/simc-linux-x64.tar.gz simc
          cd ../..

          # Linux arm64
          chmod +x artifacts/simc-linux-arm64/simc
          cd artifacts/simc-linux-arm64
          tar czf ../../release/simc-linux-arm64.tar.gz simc
          cd ../..

          # macOS
          chmod +x artifacts/simc-macos/simc
          cd artifacts/simc-macos
          tar czf ../../release/simc-macos-arm64.tar.gz simc
          cd ../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            **${{ inputs.release_type }}** build of [SimulationCraft](https://github.com/simulationcraft/simc) from commit `${{ steps.sha.outputs.sha }}`.

            ## Downloads
            | Platform | File |
            |----------|------|
            | Windows x64 | `simc-windows-x64.zip` |
            | Linux x64 | `simc-linux-x64.tar.gz` |
            | Linux ARM64 | `simc-linux-arm64.tar.gz` |
            | macOS ARM64 | `simc-macos-arm64.tar.gz` |
          files: release/*
          prerelease: ${{ inputs.release_type == 'nightly' }}
