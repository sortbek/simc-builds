name: Weekly Build

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      simc_ref:
        required: false
        type: string
        default: ""
        description: "simc commit SHA, tag, or branch (blank = master HEAD)"

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      release_type: weekly
      simc_ref: ${{ inputs.simc_ref || '' }}
    permissions:
      contents: write
